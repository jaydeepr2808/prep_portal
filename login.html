<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PrepPortal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        .form-input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            transition: var(--transition);
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="card glass login-card">
            <a href="index.html" class="logo" style="display: block; margin-bottom: 30px;">PrepPortal</a>
            <h2 style="margin-bottom: 30px;">Welcome Back</h2>
            <form>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-input" placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-input" placeholder="••••••••">
                </div>
                <button type="button" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign In</button>
            </form>
            <p style="margin-top: 25px; color: var(--text-dim); font-size: 0.9rem;">
                Don't have an account? <a href="#" style="color: var(--primary); text-decoration: none;">Create one</a>
            </p>
        </div>
    </div>
</body>
</html>
